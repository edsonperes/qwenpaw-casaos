name: build

# Publica a imagem personalizada no GitHub Container Registry (GHCR).
#
# Dispara:
#   * push na main que toque no Dockerfile/scripts (rebuild da camada fina);
#   * manualmente (Actions -> build -> Run workflow), util para puxar uma
#     versao mais recente do QwenPaw oficial;
#   * toda segunda 06:00 UTC, para incorporar atualizacoes do upstream.
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "scripts/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:
    inputs:
      base_image:
        description: "Imagem base do QwenPaw oficial"
        default: "agentscope/qwenpaw:latest"
      whisper_model:
        description: "Modelo do Whisper embutido (base/small/medium)"
        default: "base"
  schedule:
    - cron: "0 6 * * 1"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/qwenpaw-casaos

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # amd64 e' o alvo do usuario. Para tambem publicar arm64, adicione
      # "linux/arm64" abaixo e o setup-qemu-action antes deste passo
      # (o build via emulacao fica bem mais lento por causa do torch/whisper).
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ github.event.inputs.base_image || 'agentscope/qwenpaw:latest' }}
            WHISPER_MODEL=${{ github.event.inputs.whisper_model || 'base' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
